<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIA-RD · Gestión de Importaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MIA-RD · Sistema visual EXACTO de la maqueta (Claude Design)
   ============================================================ */
:root{
  --sans:'Manrope',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --display:'Space Grotesk','Manrope',system-ui,sans-serif;
  --bg:oklch(0.98 0.004 95);
  --surface:oklch(0.99 0.003 95);
  --side:oklch(0.985 0.003 95);
  --mid:oklch(0.975 0.003 95);
  --detail:oklch(0.965 0.004 95);
  --navy:oklch(0.22 0.02 260);
  --navy-ink:oklch(0.20 0.02 260);
  --text:oklch(0.24 0.01 70);
  --muted:oklch(0.55 0.01 70);
  --muted2:oklch(0.5 0.01 70);
  --label:oklch(0.4 0.01 70);
  --faint:oklch(0.6 0.01 70);
  --line:oklch(0.90 0.005 90);
  --line2:oklch(0.92 0.005 90);
  --inputline:oklch(0.88 0.005 90);
  --accent:oklch(0.55 0.14 255);
  --accent-ink:oklch(0.45 0.14 255);
  --accent-soft:oklch(0.955 0.03 255);
  --accent-border:oklch(0.85 0.06 255);
  --green:oklch(0.5 0.15 150);
  --green-soft:oklch(0.94 0.03 150);
  --red:oklch(0.58 0.18 25);
  --amber:oklch(0.5 0.12 60);
  --amber-soft:oklch(0.93 0.05 70);
  --r:16px;
  /* compat con estilos inline antiguos que aún referencian estas vars */
  --ink:var(--text); --panel:var(--surface); --danger:var(--red); --ok:var(--green);
  --warn:var(--amber); --accent-line:var(--accent-border); --line-soft:oklch(0.955 0.004 95);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font:400 14px/1.5 var(--sans);color:var(--text);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--sans);color:inherit}
button{cursor:pointer;border:none;background:none}
input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--inputline);border-radius:11px;background:oklch(0.995 0.002 95);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
input::placeholder,textarea::placeholder{color:var(--faint)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea{resize:vertical;min-height:72px;line-height:1.5}
h1,h2,h3{font-family:var(--display);font-weight:700}
.mono{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grow{flex:1;min-width:0}
.row{display:flex;align-items:center;gap:8px}
svg{display:block}

/* botones base */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:10px;
  background:var(--navy);color:#fff;font-weight:700;font-size:12.5px;white-space:nowrap;transition:filter .15s,background .15s}
.btn:hover{filter:brightness(1.12)}
.btn.acc{background:var(--accent)}
.btn.ok{background:var(--accent)}
.btn.sec{background:var(--surface);color:var(--label);border:1px solid var(--inputline);font-weight:700}
.btn.sec:hover{filter:none;background:oklch(0.97 0.003 95)}
.btn.sm{padding:8px 12px;font-size:12.5px;border-radius:9px}
.btn.gh{background:transparent;color:var(--faint);padding:4px 8px;font-weight:600}
.btn.gh:hover{background:var(--danger-soft,oklch(0.95 0.03 25));color:var(--red);filter:none}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn.sec svg{stroke:var(--label)}

/* ===== LOGIN (split) ===== */
#login{position:fixed;inset:0;z-index:100;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
#loginBrand{position:relative;overflow:hidden;background:var(--navy);color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between}
#loginBrand .blob1{position:absolute;width:520px;height:520px;border-radius:50%;background:oklch(0.55 0.14 255 / .22);top:-160px;right:-160px;filter:blur(10px)}
#loginBrand .blob2{position:absolute;width:340px;height:340px;border-radius:50%;background:oklch(0.6 0.13 285 / .18);bottom:-120px;left:-80px}
#loginBrand .bmark{display:flex;align-items:center;gap:11px;position:relative}
#loginBrand .bmark img{height:34px;width:auto;filter:brightness(0) invert(1)}
#loginBrand .bhead{position:relative}
#loginBrand .bhead .h{font-family:var(--display);font-size:40px;font-weight:700;line-height:1.1;letter-spacing:-1px}
#loginBrand .bhead p{margin-top:18px;font-size:15px;line-height:1.6;color:rgba(255,255,255,.72);max-width:400px}
#loginBrand .bfoot{position:relative;font-size:12.5px;color:rgba(255,255,255,.5)}
#loginForm{display:flex;align-items:center;justify-content:center;background:var(--bg)}
#loginCard{width:360px}
#loginLogo img{height:30px;width:auto}
.lg-h{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:16px}
.lg-sub{color:var(--muted);font-size:14px;margin-top:5px;margin-bottom:26px}
#loginCard label{font-size:12.5px;font-weight:700;color:var(--label);display:block}
#loginCard input{margin-top:6px}
.lg-check{display:flex;align-items:center;gap:7px;color:var(--muted2);font-size:12.5px;margin-top:14px;cursor:pointer}
.lg-check input{width:16px;height:16px;accent-color:var(--navy)}
@media(max-width:820px){#login{grid-template-columns:1fr}#loginBrand{display:none}}

/* ===== SHELL ===== */
#app{display:none;height:100vh;grid-template-rows:auto 1fr}
header{height:62px;flex:none;display:flex;align-items:center;gap:22px;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--line)}
#hdLogo img{height:26px;width:auto}
.navtabs{display:flex;gap:3px;background:oklch(0.955 0.004 95);padding:4px;border-radius:11px}
.ntab{padding:8px 15px;border-radius:8px;font-weight:600;font-size:13.5px;color:var(--muted2);cursor:pointer;transition:all .13s}
.ntab:hover{color:var(--text)}
.ntab.on{background:var(--surface);color:var(--navy-ink);font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.ntab .badge{display:inline-block;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:9px;margin-left:5px;vertical-align:1px}
.hdspacer{flex:1}
.userpill{display:flex;align-items:center;gap:10px;padding:5px 6px 5px 12px;background:oklch(0.955 0.004 95);border-radius:22px}
.userpill .txt{text-align:right;line-height:1.15}
.userpill .txt b{font-weight:700;font-size:13px;display:block}
.userpill .txt span{font-size:11px;color:var(--muted)}
.userpill .av{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.btn-salir{padding:8px 14px;border:1px solid var(--inputline);border-radius:9px;background:var(--surface);font-weight:700;font-size:13px;color:var(--label)}
.btn-salir:hover{background:oklch(0.97 0.003 95)}

#viewOps{display:grid;grid-template-columns:290px 330px 1fr;min-height:0;grid-row:2}
#viewFin{grid-row:2}
@media(max-width:1200px){#viewOps{grid-template-columns:260px 300px 1fr}}

/* columnas */
.col-cli{border-right:1px solid var(--line2);background:var(--side);display:flex;flex-direction:column;overflow:hidden}
.col-exp{border-right:1px solid var(--line2);background:var(--mid);display:flex;flex-direction:column;overflow:hidden}
.col-head{padding:16px 16px 12px}
.col-caption{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.col-caption .cap{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.col-caption .num{font-size:19px;font-weight:800;margin-top:1px;font-family:var(--display)}
.btn-new{display:flex;align-items:center;gap:5px;padding:9px 12px;border-radius:9px;background:var(--navy);color:#fff;font-weight:700;font-size:12.5px}
.btn-new.blue{background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent);padding:8px 11px}
.btn-new svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.search{position:relative}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--faint);fill:none;stroke-width:2}
.search input{padding:9px 12px 9px 32px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font-size:13px}
.col-list{flex:1;overflow-y:auto;padding:0 11px 16px;display:flex;flex-direction:column;gap:3px}
.col-list.explist{gap:7px}

.cli{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s}
.cli:hover{background:oklch(0.97 0.004 95)}
.cli.on{background:var(--accent-soft);border-color:var(--accent-border)}
.cli .av{width:36px;height:36px;flex:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px}
.cli .nm{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli .sub{font-size:11.5px;color:var(--muted)}
.cli .right{text-align:right}
.cli .saldo{font-size:11.5px;font-weight:700}
.cli .nexp{font-size:10px;color:var(--faint)}

.expmini{display:flex;align-items:center;gap:8px;margin:6px 0 11px;padding:9px 10px;background:var(--surface);border:1px solid var(--line);border-radius:10px}
.expmini .av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10.5px;flex:none}
.expmini b{font-weight:700;font-size:12.5px}
.expmini span{font-size:10.5px;color:var(--muted)}

.expcard{padding:12px;border-radius:13px;cursor:pointer;background:var(--surface);border:1px solid var(--line);transition:box-shadow .12s,border-color .12s}
.expcard:hover{border-color:var(--accent-border)}
.expcard.on{border-color:var(--accent-border);box-shadow:0 4px 14px oklch(0.55 0.14 255 / .12)}
.expcard .top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.expcard .ico{width:38px;height:38px;border-radius:10px;background:oklch(0.94 0.006 250);display:flex;align-items:center;justify-content:center;flex:none}
.expcard .ico svg{width:19px;height:19px;stroke:oklch(0.4 0.02 250);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.expcard .veh{font-weight:700;font-size:13.5px}
.expcard .plc{font-size:11.5px;color:var(--muted)}
.expcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--line2)}
.expcard .fecha{font-size:11px;color:var(--muted)}
.expcard .total{font-weight:800;font-size:14px;font-family:var(--display)}

.badge{flex:none;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b-prospecto{background:oklch(0.95 0.004 90);color:oklch(0.5 0.01 70)}
.b-cotizado{background:var(--accent-soft);color:var(--accent-ink)}
.b-aprobado{background:var(--green-soft);color:var(--green)}
.b-transito{background:var(--amber-soft);color:var(--amber)}
.b-aduanas{background:oklch(0.94 0.04 300);color:oklch(0.5 0.16 300)}
.b-entregado{background:oklch(0.93 0.02 150);color:var(--green)}

.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.red{background:var(--red);box-shadow:0 0 0 3px oklch(0.95 0.03 25)}

/* detalle */
.detail{background:var(--detail);overflow-y:auto;height:100%}
.dwrap{padding:20px 26px}
.dtop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.dtitle{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-.6px;color:var(--navy-ink)}
.dmeta{display:flex;gap:15px;margin-top:6px;font-size:12.5px;color:var(--muted2);flex-wrap:wrap}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px}
.tab{padding:11px 16px;font-weight:600;font-size:14px;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px;cursor:pointer}
.tab:hover{color:var(--text)}
.tab.on{font-weight:700;color:var(--navy-ink);border-bottom-color:var(--accent)}
.tab .badge2{display:inline-block;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:9px;margin-left:5px;vertical-align:1px}

/* card genérica */
.card{background:var(--surface);border:1px solid var(--line2);border-radius:16px;overflow:hidden}
.card+.card{margin-top:14px}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2)}
.card-hd .t{font-weight:800;font-size:15px}

/* ===== HOJA DE COTIZACIÓN ===== */
.cotwrap{display:flex;flex-direction:column;align-items:center;padding:2px 0 30px}
.cotbar{width:760px;max-width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cotbar .st{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--amber-soft);color:var(--amber)}
.cotbar .ed{font-size:12px;color:var(--muted)}
.cotbar .tools{display:flex;gap:8px;flex-wrap:wrap}
.cotbar .tools .btn.sec svg,.cotbar .tools .btn svg{width:14px;height:14px}
.sheet{width:760px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 14px 40px rgba(20,20,35,.10);overflow:hidden;font-size:13px;color:oklch(0.26 0.01 70)}
.sheet .band{height:6px;background:var(--navy)}
.sheet .mem{display:flex;justify-content:space-between;align-items:flex-start;padding:34px 44px 24px}
.sheet .mem .brand{display:flex;gap:13px;align-items:center}
.sheet .mem .brand img{height:44px;width:auto}
.sheet .mem .co{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.5px;color:var(--navy-ink)}
.sheet .mem .cx{font-size:11.5px;color:var(--muted2)}
.sheet .mem .doc{text-align:right}
.sheet .mem .doc .k{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:1px;color:var(--navy-ink)}
.sheet .mem .doc .rows{font-size:12px;color:var(--muted2);margin-top:6px;line-height:1.7}
.sheet .mem .doc .rows .lbl{color:var(--faint)}
.sheet .mem .doc .rows b{color:oklch(0.26 0.01 70)}
.sheet .party{display:grid;grid-template-columns:1fr 1fr;margin:0 44px;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.sheet .party .p{padding:16px 18px}
.sheet .party .p:first-child{border-right:1px solid oklch(0.94 0.005 90)}
.sheet .party .l{font-size:10.5px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.sheet .party .big{font-weight:700;font-size:14px}
.sheet .party .sm{font-size:12px;color:var(--muted2);line-height:1.6;margin-top:3px}
.cotgrid{margin:22px 44px 0}
.cotgrid .hd{display:grid;grid-template-columns:28px 1fr 118px 118px 96px;padding:10px 14px;background:var(--navy);border-radius:8px 8px 0 0;color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.cotgrid .hd span:nth-child(n+3){text-align:right}
.crow{display:grid;grid-template-columns:28px 1fr 118px 118px 96px;align-items:center;padding:5px 14px;border-bottom:1px solid oklch(0.955 0.004 95)}
.crow .n{font-size:11.5px;color:var(--faint);font-variant-numeric:tabular-nums}
.crow .cellinput{border:1px solid transparent;background:transparent;padding:5px 7px;border-radius:7px;font-size:12.5px;width:100%;font-variant-numeric:tabular-nums}
.crow .cellinput.cn{font-weight:600}
.crow .cellinput.cq{text-align:right;color:var(--muted2)}
.crow .cellinput.cr{text-align:right;font-weight:700}
.crow .cellinput:hover{background:oklch(0.97 0.004 95)}
.crow .cellinput:focus{background:#fff;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.crow .var{text-align:right;font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums}
.crow .xbtn{text-align:right}
.crow .xbtn button{color:var(--faint);font-size:12px;padding:2px 5px;border-radius:5px}
.crow .xbtn button:hover{color:var(--red);background:oklch(0.95 0.03 25)}
.cottools{margin:8px 44px 0;display:flex;gap:8px;align-items:center}
.cottools .btn{font-size:11.5px;padding:6px 10px}
.cotbot{display:flex;justify-content:space-between;align-items:flex-end;margin:20px 44px 0;gap:30px}
.cotbot .cond{flex:1;padding:14px 16px;background:var(--mid);border-radius:10px}
.cotbot .cond .l{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.cotbot .cond .tx{font-size:11.5px;color:var(--muted2);line-height:1.6}
.cotbot .cond textarea{background:#fff;font-size:11.5px;min-height:50px;margin-top:4px}
.cottot{width:250px}
.cottot .r{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted2);padding:6px 0}
.cottot .r.b{border-bottom:1px solid var(--line)}
.cottot .grand{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:12px 14px;background:var(--navy);border-radius:10px;color:#fff}
.cottot .grand span:first-child{font-weight:700;font-size:13px}
.cottot .grand span:last-child{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.sheet .sign{display:flex;justify-content:space-between;align-items:flex-end;margin:34px 44px 36px}
.sheet .sign .s{width:220px;text-align:center;border-top:1.5px solid oklch(0.7 0.01 70);padding-top:7px;font-size:11.5px;color:var(--muted2)}
.sheet .foot{text-align:center;padding:12px;background:var(--mid);border-top:1px solid var(--line2);font-size:10.5px;color:var(--faint)}
.delta{font-weight:700;white-space:nowrap}
.delta.up{color:var(--red)}
.delta.dn{color:var(--green)}

/* pagos / recordatorios / detalles */
.g2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start}
.g2.even{grid-template-columns:1fr 1fr}
.paylist{padding:8px}
.payrow{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid oklch(0.96 0.003 95)}
.payrow:last-child{border-bottom:none}
.payrow .ic{width:36px;height:36px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;flex:none}
.payrow .ic svg{width:17px;height:17px;stroke:var(--green);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.payrow .m{font-weight:700;font-size:13.5px}
.payrow .f{font-size:11.5px;color:var(--muted)}
.payrow .amt{font-weight:700;font-size:15px;color:var(--green)}
.paycard{background:var(--surface);border:1px solid var(--line2);border-radius:16px;padding:18px}
.paycard .cap{font-size:12.5px;color:var(--muted);font-weight:600}
.paycard .big{font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:-1px;margin-top:5px}
.paybar{height:8px;border-radius:5px;background:var(--green-soft);margin-top:12px;overflow:hidden}
.paybar>i{display:block;height:100%;background:var(--green)}
.remrow{display:flex;align-items:center;gap:13px;padding:13px 10px;border-bottom:1px solid oklch(0.96 0.003 95)}
.remrow:last-child{border-bottom:none}
.remrow .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.remrow .ti{font-weight:700;font-size:14px}
.remrow .cu{font-size:12px;color:var(--muted)}
.remrow.done .ti{text-decoration:line-through;opacity:.6}
.remrow input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);flex:none}
.kv{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid oklch(0.955 0.004 95);font-size:13.5px}
.kv span:first-child{color:var(--muted)}
.kv span:last-child{font-weight:700}
.kv input,.kv textarea{width:60%;padding:6px 9px;font-size:13px}

/* empty */
.empty{text-align:center;color:var(--muted);font-size:12.5px;padding:34px 18px;line-height:1.7}
.empty b{color:var(--text)}

/* ===== FINANZAS ===== */
#viewFin{display:none;flex:1;overflow-y:auto;padding:24px 28px;min-height:0}
#viewFin.on{display:block}
.finhd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.finhd h1{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-.6px;color:var(--navy-ink)}
.finhd p{color:var(--muted);font-size:13.5px;margin-top:3px}
.finhd .tools{display:flex;align-items:center;gap:10px}
.datepill{display:flex;align-items:center;gap:8px;padding:9px 13px;background:oklch(0.955 0.004 95);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.datepill svg{width:15px;height:15px;stroke:var(--label);fill:none;stroke-width:2}
.btn-exp{display:flex;align-items:center;gap:7px;padding:10px 15px;border:1px solid var(--inputline);border-radius:10px;background:var(--surface);font-weight:700;font-size:13px;color:var(--label)}
.btn-exp svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:1050px){.fkpis{grid-template-columns:repeat(2,1fr)}}
.fk{background:var(--surface);border:1px solid var(--line2);border-radius:15px;padding:17px 18px}
.fk .top{display:flex;align-items:center;justify-content:space-between}
.fk .lbl{font-size:12.5px;font-weight:600;color:var(--muted)}
.fk .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.fk .val{font-family:var(--display);font-size:25px;font-weight:700;letter-spacing:-.8px;margin-top:8px}
.fk .sub{font-size:11.5px;font-weight:700;margin-top:3px}
.fgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:1050px){.fgrid{grid-template-columns:1fr}}
.chartcard{background:var(--surface);border:1px solid var(--line2);border-radius:16px;padding:18px 20px}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.chart-head .t{font-weight:800;font-size:15px}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted2)}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
.bars{display:flex;align-items:flex-end;gap:8px;height:190px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;min-width:0}
.bar-stack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:100%;gap:2px}
.bar-stack .h2{width:100%;background:oklch(0.9 0.02 255);border-radius:4px 4px 0 0}
.bar-stack .h1{width:100%;background:var(--accent);border-radius:4px 4px 0 0}
.bar-col .d{font-size:10px;color:var(--faint)}
.movcard{background:var(--surface);border:1px solid var(--line2);border-radius:16px;overflow:hidden}
.movhd{padding:15px 18px;border-bottom:1px solid var(--line2);font-weight:800;font-size:15px}
.movlist{padding:6px 8px}
.movrow{display:flex;align-items:center;gap:11px;padding:10px}
.movrow .ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.movrow .ic svg{width:15px;height:15px;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.movrow .nm{font-weight:700;font-size:13px}
.movrow .f{font-size:11px;color:var(--muted)}
.movrow .amt{font-weight:700;font-size:13.5px}
.baltable{background:var(--surface);border:1px solid var(--line2);border-radius:16px;overflow:hidden}
.baltable .thd{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;padding:11px 20px;background:var(--mid);border-bottom:1px solid var(--line2);font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--muted2);text-transform:uppercase}
.baltable .thd span:nth-child(n+2){text-align:right}
.balrow{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;align-items:center;padding:12px 20px;border-bottom:1px solid oklch(0.96 0.003 95);cursor:pointer}
.balrow:last-child{border-bottom:none}
.balrow:hover{background:oklch(0.975 0.004 95)}
.balrow .who{display:flex;align-items:center;gap:10px}
.balrow .av{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;flex:none}
.balrow .nm{font-weight:700;font-size:13.5px}
.balrow .c{text-align:right;font-size:13px;font-variant-numeric:tabular-nums}
.balrow .c.cot{color:var(--muted2)}
.balrow .c.cob{font-weight:700;color:var(--green)}
.balrow .c.pc{font-weight:700}
.balrow .c.va{font-size:12.5px;font-weight:700}

/* ===== MODAL ===== */
#overlay{position:fixed;inset:0;background:oklch(0.2 0.02 260 / .45);backdrop-filter:blur(3px);z-index:60;display:none;align-items:center;justify-content:center;padding:22px}
#overlay.on{display:flex}
.modal{width:100%;max-width:480px;max-height:88vh;background:var(--surface);border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(15,15,25,.4);display:flex;flex-direction:column;animation:pop .16s ease-out}
@keyframes pop{from{transform:translateY(8px) scale(.985);opacity:.6}to{transform:none;opacity:1}}
.modal.wide{max-width:620px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line2)}
.modal-hd .l{display:flex;align-items:center;gap:12px}
.modal-hd .mi{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.modal-hd h3{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:-.3px}
.modal-hd .sub{font-size:12.5px;color:var(--muted)}
.modal-x{width:34px;height:34px;border-radius:9px;background:oklch(0.955 0.004 95);display:flex;align-items:center;justify-content:center;color:var(--label);font-size:15px}
.modal-x:hover{background:oklch(0.93 0.005 90)}
.modal-bd{padding:22px 24px;overflow-y:auto}
.modal-ft{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--line2);background:var(--mid)}
.modal-ft .btn{padding:11px 20px;font-size:13.5px}
.modal-ft .btn.sec{padding:11px 18px}
.f label{display:block;font-size:12.5px;font-weight:700;color:var(--label);margin-bottom:6px}
.f+.f{margin-top:15px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .f+.f{margin-top:0}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;background:var(--surface);color:var(--label);border:1px solid var(--inputline);cursor:pointer}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* calendario de rango */
.calwrap{position:relative}
.calbtn{display:flex;align-items:center;gap:8px;padding:9px 13px;background:oklch(0.955 0.004 95);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text)}
.calbtn svg{width:15px;height:15px;stroke:var(--label);fill:none;stroke-width:2}
.calbtn .hint{font-weight:600;color:var(--accent);font-size:11.5px}
.calpop{position:absolute;top:calc(100% + 8px);right:0;z-index:50;width:278px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 80px rgba(15,15,25,.4);padding:14px;display:none}
.calpop.on{display:block}
.calnav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.calnav b{flex:1;text-align:center;font-family:var(--display);font-size:13px;font-weight:600}
.calnav button{width:28px;height:28px;border-radius:8px;color:var(--muted);font-size:16px}
.calnav button:hover{background:oklch(0.955 0.004 95);color:var(--text)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cald{height:32px;border-radius:8px;font-size:12.5px;font-variant-numeric:tabular-nums;display:flex;align-items:center;justify-content:center}
.calh{height:22px;font-size:9.5px;font-weight:700;color:var(--faint);text-transform:uppercase}
.cald:not(.calh):not(.blank):hover{background:var(--accent-soft)}
.cald.inr{background:var(--accent-soft);border-radius:0}
.cald.end{background:var(--navy);color:#fff;font-weight:700}
.cald.end.a{border-radius:8px 0 0 8px}.cald.end.b{border-radius:0 8px 8px 0}.cald.end.solo{border-radius:8px}
.cald.hoy{box-shadow:inset 0 0 0 1.5px var(--navy)}
.calft{display:flex;gap:8px;align-items:center;margin-top:12px;border-top:1px solid var(--line2);padding-top:11px}
.calft .tiny{flex:1;color:var(--muted);line-height:1.4;font-size:11px}
.chips-cal{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip-cal{padding:7px 13px;border:1px solid var(--inputline);border-radius:20px;font-size:12px;font-weight:700;background:var(--surface);color:var(--muted);cursor:pointer}
.chip-cal:hover{color:var(--text)}
.chip-cal.on{background:var(--navy);color:#fff;border-color:var(--navy)}

#verTag{position:fixed;bottom:8px;right:12px;z-index:40;font-size:10.5px;font-weight:700;color:var(--faint);letter-spacing:.4px;pointer-events:none;opacity:.7}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;transition:transform .28s cubic-bezier(.2,.9,.3,1.3);pointer-events:none;box-shadow:0 20px 50px rgba(15,15,25,.35)}
#toast.on{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:oklch(0.82 0.005 90);border-radius:9px}

</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div id="loginBrand">
    <div class="blob1"></div><div class="blob2"></div>
    <div class="bmark" id="brandLogo"></div>
    <div class="bhead">
      <div class="h">Importación de<br>vehículos y piezas,<br>bajo control.</div>
      <p>Cotizaciones, expedientes, pagos y recordatorios de tus clientes en un solo lugar.</p>
    </div>
    <div class="bfoot" id="brandFoot">© 2026 MIA-RD · Santo Domingo, R.D.</div>
  </div>
  <div id="loginForm"><div id="loginCard"></div></div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header>
    <div id="hdLogo"></div>
    <nav class="navtabs">
      <span class="ntab on" id="navOps" onclick="setView('ops')">Operaciones</span>
      <span class="ntab" id="navFin" onclick="setView('fin')">Finanzas</span>
      <span class="ntab" onclick="openRecordatorios()">Recordatorios <span id="remCount"></span></span>
      <span class="ntab" onclick="openPlantillas()">Plantillas</span>
      <span class="ntab" onclick="openAjustes()">Ajustes</span>
    </nav>
    <div class="hdspacer"></div>
    <div class="userpill">
      <div class="txt"><b id="usrNom"></b><span>Administrador</span></div>
      <div class="av" id="usrAv">M</div>
    </div>
    <button class="btn-salir" onclick="salir()" title="Cerrar sesión">Salir</button>
  </header>

  <main id="viewOps">
    <!-- Clientes -->
    <aside class="col-cli">
      <div class="col-head">
        <div class="col-caption">
          <div><div class="cap">CLIENTES</div><div class="num" id="cntCli">0</div></div>
          <button class="btn-new" onclick="nuevoCliente()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Nuevo</button>
        </div>
        <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="qCli" placeholder="Buscar cliente…" oninput="renderClientes()"></div>
      </div>
      <div class="col-list" id="listCli"></div>
    </aside>

    <!-- Expedientes -->
    <section class="col-exp">
      <div class="col-head">
        <div class="col-caption" style="margin-bottom:6px"><div class="cap">EXPEDIENTES</div>
          <button class="btn-new blue" id="btnNewExp" onclick="nuevoExpediente()" disabled><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Nuevo</button></div>
        <div id="expMini"></div>
        <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="qExp" placeholder="Buscar vehículo o pieza…" oninput="renderExpedientes()"></div>
      </div>
      <div class="col-list explist" id="listExp"></div>
    </section>

    <!-- Detalle -->
    <section class="detail" id="detail"></section>
  </main>

  <!-- Finanzas -->
  <section id="viewFin"></section>
  <div id="verTag"></div>
</div>

<div id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

}

let DB, state = {cli:null, exp:null, tab:"cot", view:"ops", desde:"", hasta:"", rango:"mes"};

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function load(){
  try{ const r = localStorage.getItem(KEY); DB = r ? JSON.parse(r) : seed(); }

  if(!DB.settings) DB = seed();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(DB)); }

/* ================= HELPERS ================= */
const $ = id => document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function fmtNum(n){
  return (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function parseNum(v){
  const n = Number(String(v==null?"":v).replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
function money(n){ return DB.settings.moneda+" "+fmtNum(n); }
function today(){return new Date().toISOString().slice(0,10)}
function fdate(d){
  if(!d) return "—";
  const [y,m,dd]=d.split("-");
  return `${dd}/${m}/${y}`;
}
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),2200);
}
function cliente(id){return DB.clientes.find(c=>c.id===id)}
function expediente(id){return DB.expedientes.find(e=>e.id===id)}
function expsDe(cid){return DB.expedientes.filter(e=>e.clienteId===cid)}

function totalCot(e){return (e.cotizacion.lineas||[]).reduce((s,l)=>s+(Number(l.monto)||0),0)}
function totalReal(e){return (e.cotizacion.lineas||[]).reduce((s,l)=>s+(l.real===null||l.real===""?(Number(l.monto)||0):(Number(l.real)||0)),0)}
function totalPag(e){return (e.pagos||[]).reduce((s,p)=>s+(Number(p.monto)||0),0)}
function balance(e){return totalReal(e)-totalPag(e)}
function remPend(e){return (e.recordatorios||[]).filter(r=>!r.hecho)}
function remVencidos(e){const t=today();return remPend(e).filter(r=>r.fecha&&r.fecha<=t)}

/* ================= MODAL =================
   No se cierra al hacer clic fuera (evita perder lo escrito).
   Esc = atrás, con confirmación si hay datos sin guardar.        */
let modalDirty = false;
function modalIcon(t){
  t = (t||"").toLowerCase();
  if(t.includes("cliente"))       return "👤";
  if(t.includes("expediente"))    return "🚗";
  if(t.includes("abono")||t.includes("pago")) return "💵";
  if(t.includes("recordatorio"))  return "🔔";
  if(t.includes("plantilla"))     return "📄";
  if(t.includes("ajuste"))        return "⚙️";
  if(t.includes("cargar"))        return "📄";
  return "✎";
}
function modalSub(t){
  t=(t||"").toLowerCase();
  if(t==="nuevo cliente")      return "Registra los datos de contacto";
  if(t==="editar cliente")     return "Actualiza los datos del cliente";
  if(t.includes("expediente")) return "Vehículo o pieza a importar";
  if(t.includes("abono"))      return "Registra un pago del cliente";
  if(t.includes("recordatorio"))return "Se avisará en la fecha indicada";
  if(t.includes("plantilla"))  return "Conceptos reutilizables";
  if(t.includes("ajuste"))     return "Empresa, moneda e impuestos";
  return "";
}
function modalIconBg(t){
  t=(t||"").toLowerCase();
  if(t.includes("abono")||t.includes("pago")) return "var(--green-soft)";
  if(t.includes("recordatorio")) return "oklch(0.94 0.05 40)";
  if(t.includes("plantilla")) return "oklch(0.94 0.03 285)";
  if(t.includes("ajuste")) return "oklch(0.94 0.004 95)";
  return "var(--accent-soft)";
}
function modal(title, body, footer, wide){
  modalDirty = false;
  $("modal").className = "modal"+(wide?" wide":"");
  $("modal").innerHTML =
    `<div class="modal-hd"><div class="l"><div class="mi" style="background:${modalIconBg(title)}">${modalIcon(title)}</div>
       <div><h3>${esc(title)}</h3>${modalSub(title)?`<div class="sub">${modalSub(title)}</div>`:""}</div></div>
       <button class="modal-x" onclick="closeModal()" title="Cerrar (Esc)">✕</button></div>
     <div class="modal-bd">${body}</div>
     <div class="modal-ft">${footer||'<button class="btn sec" onclick="closeModal()">Cerrar</button>'}</div>`;
  $("overlay").classList.add("on");
  $("modal").addEventListener("input", ()=>{ modalDirty = true; });
  setTimeout(()=>{const f=$("modal").querySelector("input,textarea,select");if(f)f.focus()},40);
}
function closeModal(force){
  if(!force && modalDirty && !confirm("Tienes datos sin guardar en esta ventana.\n\n¿Salir y descartarlos?")) return;
  modalDirty = false;
  $("overlay").classList.remove("on");
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape" && $("overlay").classList.contains("on")){ e.preventDefault(); closeModal(); }
});

/* ================= ACCESO =================
   La primera vez que se abre, cada quien define su propio usuario y clave.
   Así no hay una contraseña por defecto escrita en el código publicado. */
/* Si ACCESO viene definido en el archivo, esas son las credenciales
   y la pantalla de "crear acceso" nunca aparece. */
function accesoFijo(){ return !!(ACCESO.user && ACCESO.pass); }
function credenciales(){ return accesoFijo() ? ACCESO : DB.settings; }
function configurado(){ const c = credenciales(); return !!(c.user && c.pass); }

    ` : `

      <div class="lg-sub">Ingresa tus credenciales para continuar.</div>
      <div class="f"><label>Usuario</label>
        <input id="lgUser" autocomplete="off" value="${esc(accesoFijo()?"":DB.settings.user)}" onkeydown="if(event.key==='Enter')$('lgPass').focus()"></div>
      <div class="f" style="margin-top:12px"><label>Clave</label>
        <input id="lgPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
        <label class="lg-check"><input type="checkbox" id="lgRem" checked> Recordarme</label>
        <span style="font-size:12.5px;color:var(--accent);cursor:pointer" onclick="toast('Abre el archivo con el Bloc de notas para ver o cambiar la clave.')">¿Olvidaste tu clave?</span>
      </div>
      <button class="btn acc" style="width:100%;margin-top:22px;padding:14px;font-size:15px" onclick="doLogin()">Entrar</button>
    `}`;
  paintLogos();
  setTimeout(()=>{ const f=$(nuevo?"lgUser":"lgPass"); if(f)f.focus(); },50);
}

function doSetup(){
  const u=$("lgUser").value.trim(), p=$("lgPass").value, p2=$("lgPass2").value;
  if(!u){ toast("Escribe un usuario"); return; }
  if(p.length<4){ toast("La clave debe tener al menos 4 caracteres"); return; }
  if(p!==p2){ toast("Las claves no coinciden"); return; }
  DB.settings.user=u; DB.settings.pass=p; save();
  entrar();
}
function doLogin(){
  const u=$("lgUser").value.trim(), p=$("lgPass").value, c=credenciales();
  if(u===c.user && p===c.pass) entrar();
  else toast("Usuario o clave incorrectos");
}

/* La sesión sobrevive al refresco de la página y al cierre del navegador.
   Se renueva con cada entrada y caduca a los 7 días sin usarse. */
function sesionActiva(){
  const h = DB.settings.sesionHasta;
  return !!(h && Date.parse(h) > Date.now());
}
function entrar(){
  const rem = $("lgRem") ? $("lgRem").checked : true;
  DB.settings.sesionHasta = new Date(Date.now() + (rem?7*864e5:12*36e5)).toISOString();
  save();
  $("login").style.display = "none";
  $("app").style.display = "grid";
  boot();
}
function salir(){
  if(!confirm("¿Cerrar sesión?\n\nTus datos quedan guardados en esta computadora.")) return;
  DB.settings.sesionHasta = null; save();
  state.cli=null; state.exp=null; state.exp=null; state.view="ops"; state.tab="cot";
  $("app").style.display = "none";
  $("login").style.display = "flex";
  renderLogin();
}

/* ================= RENDER ================= */
function renderAll(){
  save(); renderKPIs(); renderClientes(); renderExpedientes(); renderDetalle();
  if(state.view==="fin") renderFinanzas();
}

function setView(v){
  state.view = v;
  $("viewOps").style.display = v==="ops" ? "grid" : "none";
  $("viewFin").classList.toggle("on", v==="fin");
  $("navOps").classList.toggle("on", v==="ops");
  $("navFin").classList.toggle("on", v==="fin");
  if(v==="fin") renderFinanzas();
  renderKPIs();
}

/* Los KPIs del encabezado son SIEMPRE del cliente seleccionado.
   La visión general de la empresa vive en la pantalla Finanzas. */
function renderKPIs(){
  const n = DB.expedientes.reduce((s,e)=>s+remVencidos(e).length,0);
  const rc = $("remCount");
  if(rc) rc.innerHTML = n ? `<span class="badge">${n}</span>` : "";
}

/* Un expediente entra a la gestión financiera cuando deja de ser
   una simple cotización: al facturarse o al aprobarse. */
function esAprobado(e){
  return (e.factura && e.factura.activa) ||
         ["Aprobado","En tránsito","En aduanas","Entregado"].includes(e.estado);
}

function renderClientes(){
  const q = $("qCli").value.toLowerCase();
  const list = DB.clientes.filter(c=>!q || c.nombre.toLowerCase().includes(q) || (c.telefono||"").includes(q));
  $("listCli").innerHTML = list.length ? list.map(c=>{
    const ex = expsDe(c.id);
    const apr = ex.filter(esAprobado);
    const saldo = apr.reduce((s,e)=>s+Math.max(0,balance(e)),0);
    const alert = ex.some(e=>remVencidos(e).length);
    return `<div class="cli ${state.cli===c.id?"on":""}" onclick="selCliente('${c.id}')">
      <div class="av" style="background:${avColor(c.nombre)}">${esc(inicial(c.nombre))}</div>
      <div class="grow">
        <div class="row"><div class="nm grow trunc">${esc(c.nombre)}</div>${alert?'<div class="dot red"></div>':""}</div>
        <div class="sub trunc">${c.telefono?esc(c.telefono):("Sin teléfono")}</div>
      </div>
      <div class="right">
        <div class="saldo" style="color:${saldo>0?"var(--red)":"var(--muted)"}">${money(saldo)}</div>
        <div class="nexp">${ex.length} exp.</div>
      </div>
    </div>`;
  }).join("") : `<div class="empty">Sin clientes.<br>Presiona <b>Nuevo</b> para empezar.</div>`;
  const cnt = $("cntCli"); if(cnt) cnt.textContent = DB.clientes.length;
}

function renderExpedientes(){
  const c = cliente(state.cli);
  $("btnNewExp").disabled = !c;
  const mini = $("expMini");
  if(!c){
    if(mini) mini.innerHTML = "";
    $("listExp").innerHTML = `<div class="empty">Selecciona un cliente<br>para ver sus expedientes.</div>`;
    return;
  }
  const ex = expsDe(c.id);
  if(mini) mini.innerHTML = `<div class="expmini">
    <div class="av" style="background:${avColor(c.nombre)}">${esc(inicial(c.nombre))}</div>
    <div><b>${esc(c.nombre)}</b><div>${c.telefono?esc(c.telefono)+" · ":""}${ex.length} expediente${ex.length!==1?"s":""}</div></div>
  </div>`;
  const q = $("qExp").value.toLowerCase();
  const list = ex.filter(e=>!q || e.titulo.toLowerCase().includes(q) || (e.vin||"").toLowerCase().includes(q));
  $("listExp").innerHTML = list.length ? list.map(e=>{
    const v = remVencidos(e).length;
    const bal = balance(e), esFact = e.factura && e.factura.activa;
    const tot = esFact ? (bal>0?money(bal):"Saldado") : money(totalCot(e));
    return `<div class="expcard ${state.exp===e.id?"on":""}" onclick="selExpediente('${e.id}')">
      <div class="top">
        <div class="row" style="gap:9px">
          <div class="ico">${ICON.car}</div>
          <div style="line-height:1.25"><div class="veh">${esc(e.titulo)}</div>
            <div class="plc">${e.vin?esc(e.vin)+" · ":""}Vehículo</div></div>
        </div>
        <span class="badge ${PILL[e.estado]||"b-prospecto"}">${esc(e.estado)}</span>
      </div>
      <div class="foot"><div class="fecha">${v?'<span style="color:var(--red);font-weight:700">⚠ '+v+' pendiente'+(v>1?'s':'')+'</span>':fabierto(e.creado)}</div>
        <div class="total" style="${esFact&&bal<=0?'color:var(--green)':''}">${tot}</div></div>
    </div>`;
  }).join("") : `<div class="empty">Sin expedientes para <b>${esc(c.nombre)}</b>.<br>Presiona <b>Nuevo</b>.</div>`;
}

function selCliente(id){ state.cli=id; state.exp=null; $("qExp").value=""; renderAll(); }
function selExpediente(id){ state.exp=id; renderAll(); }
function setTab(t){ state.tab=t; renderDetalle(); }

/* ---------- Detalle ---------- */

    <div class="dtop">
      <div>
        <div class="row" style="gap:10px">
          <h1 class="dtitle">${esc(e.titulo)}</h1>
          <span class="badge ${PILL[e.estado]||"b-prospecto"}" style="font-size:11px;padding:5px 11px">${esc(e.estado)}</span>
        </div>
        <div class="dmeta">
          ${e.vin?`<span>VIN ${esc(e.vin)}</span>`:""}
          <span>${esFact?"Factura "+esc(e.factura.numero):"Cotización "+esc(e.cotizacion.numero)}</span>
          <span>${esc(c?c.nombre:"—")}</span>
        </div>
      </div>
      <div class="row" style="gap:8px">
        <select style="width:auto;padding:9px 12px;font-size:12.5px;font-weight:700" onchange="cambiarEstado('${e.id}',this.value)">
          ${ESTADOS.map(s=>`<option ${e.estado===s?"selected":""}>${s}</option>`).join("")}
        </select>

/* ---------- Tab Cotización ---------- */
function deltaHTML(d){
  if(d===null || d===0) return '<span class="muted tiny">—</span>';
  return `<span class="delta ${d>0?"up":"dn"}">${d>0?"▲":"▼"} ${money(Math.abs(d))}</span>`;
}
function lineaHTML(e,l,i){
  const real = (l.real===null||l.real==="")?null:Number(l.real);
  const d = real===null?null:real-(Number(l.monto)||0);
  return `<div class="crow" data-i="${i}">
    <span class="n">${String(i+1).padStart(2,"0")}</span>
    <input class="cellinput cn" value="${esc(l.concepto)}" placeholder="Concepto"
      oninput="editLinea('${e.id}',${i},'concepto',this.value)">
    <input class="cellinput cq" data-col="monto" data-row="${i}" inputmode="decimal"
      value="${l.monto?fmtNum(l.monto):""}" placeholder="0.00"
      oninput="editLinea('${e.id}',${i},'monto',this.value)" onkeydown="navCot(event,this)"
      onfocus="rawFocus(this)" onblur="fmtBlur(this)"
      ondragstart="event.dataTransfer.effectAllowed='copy'" ondragover="event.dataTransfer.dropEffect='copy'" ondrop="dropCopia(this)">
    <input class="cellinput cr" data-col="real" data-row="${i}" inputmode="decimal"
      value="${real===null?"":fmtNum(real)}" placeholder="—"
      oninput="editLinea('${e.id}',${i},'real',this.value)" onkeydown="navCot(event,this)"
      onfocus="rawFocus(this)" onblur="fmtBlur(this)"
      ondragstart="event.dataTransfer.effectAllowed='copy'" ondragover="event.dataTransfer.dropEffect='copy'" ondrop="dropCopia(this)">
    <span class="var" id="d-${i}">${varCell(d)}<button onclick="delLinea('${e.id}',${i})" title="Eliminar" style="margin-left:6px;color:var(--faint);opacity:.5">✕</button></span>
  </div>`;
}
function varCell(d){
  if(d===null||d===0) return '<span style="color:var(--faint)">—</span>';
  return `<span class="delta ${d>0?"up":"dn"}">${d>0?"▲":"▼"} ${money(Math.abs(d))}</span>`;
}

function tabCot(e){

    <div class="cotbar">
      <div class="row">

      <div class="tools">

        <button class="btn" onclick="imprimir('${e.id}')">${ICON.printer}Imprimir / PDF</button>
      </div>
    </div>

    <div class="sheet">
      <div class="band"></div>
      <div class="mem">
        <div class="brand">
          <img src="${s.logo||LOGO_DEF}">
          <div>
            <div class="cx">${s.rnc?"RNC "+esc(s.rnc)+" · ":""}${esc(s.empresa||"MIA-RD Importaciones")}</div>
            <div class="cx">${[s.tel,s.email].filter(Boolean).map(esc).join(" · ")||"Santo Domingo, R.D."}</div>
          </div>
        </div>
        <div class="doc">
          <div class="k">${esFact?"FACTURA":"COTIZACIÓN"}</div>
          <div class="rows">
            <div><span class="lbl">No.</span> <b>${esc(num)}</b></div>
            <div><span class="lbl">Fecha</span> <b>${fshort(fecha)}</b></div>
            ${esFact?"":`<div><span class="lbl">Válida hasta</span> <b>${fshort(vence)}</b></div>`}
          </div>
        </div>
      </div>

      <div class="party">
        <div class="p"><div class="l">Cliente</div>
          <div class="big">${esc(c?c.nombre:"—")}</div>
          <div class="sm">${[c&&c.telefono,c&&c.email].filter(Boolean).map(esc).join(" · ")||"&nbsp;"}</div></div>
        <div class="p"><div class="l">Vehículo</div>
          <div class="big">${esc(e.titulo)}</div>
          <div class="sm">${e.vin?"VIN "+esc(e.vin):"&nbsp;"}</div></div>
      </div>

      <div class="cotgrid">
        <div class="hd"><span>#</span><span>Concepto</span><span>Cotizado</span><span>Real</span><span>Variación</span></div>
        <div id="cotBody">${L.length?L.map((l,i)=>lineaHTML(e,l,i)).join(""):`<div class="crow" style="grid-template-columns:1fr"><span class="muted" style="padding:12px 4px;text-align:center">Sin conceptos todavía.</span></div>`}</div>

      <div class="cottools">

        <button class="btn sec" onclick="guardarComoPlantilla('${e.id}')">Guardar como plantilla</button>
        <span class="muted" style="font-size:11px;margin-left:auto">Tab baja por la columna · arrastra un monto para copiarlo</span>
      </div>

      <div class="cotbot">
        <div class="cond"><div class="l">Condiciones</div>
          <textarea onchange="setCot('${e.id}','notas',this.value)" placeholder="Anticipo, tiempos de entrega, notas para el cliente…">${esc(e.cotizacion.notas||s.terminos||"")}</textarea>
        </div>
        <div class="cottot">
          <div class="r"><span>Cotizado</span><span class="mono" id="tCot">${money(tc)}</span></div>
          <div class="r b"><span>Real / Pagado</span><span class="mono" id="tReal">${money(tr)}</span></div>
          <div class="r"><span>Variación</span><span id="tVar">${varCell(tr-tc)}</span></div>
          <div class="grand"><span>Total</span><span id="tGrand">${money(esFact?tr:tc)}</span></div>
        </div>
      </div>

      <div class="sign">
        <div class="s">Firma autorizada · ${esc(s.empresa||"MIA-RD")}</div>
        <div class="s">Aceptación del cliente</div>
      </div>
      <div class="foot">Gracias por confiar en ${esc(s.empresa||"MIA-RD")} · ${esFact?"Factura":"Este documento es una cotización, no una factura fiscal."}</div>
    </div>
  </div>`;
}

/* ---------- Tab Pagos ---------- */
function tabPag(e){
  const tr = totalReal(e), tp = totalPag(e), bal = Math.max(0,tr-tp);
  const pct = tr>0?Math.min(100,tp/tr*100):0;
  const P = (e.pagos||[]).slice().sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const prox = remPend(e).filter(r=>r.fecha).sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
  const dias = prox ? Math.round((Date.parse(prox.fecha)-Date.now())/864e5) : null;
  return `<div class="g2">
    <div class="card">
      <div class="card-hd"><div class="t">Historial de pagos</div>
        <button class="btn acc sm" onclick="nuevoPago('${e.id}')">+ Registrar abono</button></div>
      <div class="paylist">${P.length?P.map(p=>`
        <div class="payrow">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
          <div class="grow"><div class="m">${esc(p.metodo||"Abono")}${p.concepto?" · "+esc(p.concepto):""}</div><div class="f">${fshort(p.fecha)}</div></div>
          <div class="amt">${money(p.monto)}</div>
          <button class="btn gh" onclick="delPago('${e.id}','${p.id}')">✕</button>
        </div>`).join(""):`<div class="empty">Sin abonos registrados.</div>`}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="paycard">
        <div class="cap">Saldo pendiente</div>
        <div class="big" style="color:${bal>0?"var(--red)":"var(--green)"}">${money(bal)}</div>
        <div class="paybar"><i style="width:${pct}%"></i></div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:7px">Abonado ${money(tp)} de ${money(tr)}</div>
      </div>
      <div class="paycard">
        <div class="cap">Próximo recordatorio</div>
        <div class="big" style="font-size:20px">${prox?fshort(prox.fecha):"—"}</div>
        <div style="font-size:11.5px;margin-top:3px;font-weight:600;color:${dias!==null&&dias<=3?"var(--amber)":"var(--muted)"}">${prox?(dias<0?"Vencido":dias===0?"Hoy":"En "+dias+" día"+(dias!==1?"s":"")):"Sin recordatorios con fecha"}</div>
      </div>
    </div>
  </div>`;
}

/* ---------- Tab Recordatorios ---------- */
function tabRem(e){
  const R = (e.recordatorios||[]).slice().sort((a,b)=>
    (a.hecho?1:0)-(b.hecho?1:0) || (a.fecha||"9999").localeCompare(b.fecha||"9999"));
  const t = today();
  return `<div class="card">
    <div class="card-hd"><div class="t">Recordatorios del expediente</div>
      <button class="btn acc sm" onclick="nuevoRecordatorio('${e.id}')">+ Nuevo</button></div>
    <div style="padding:8px">${R.length?R.map(r=>{
      const venc = !r.hecho && r.fecha && r.fecha<=t;
      const tag = r.hecho?["Hecho","var(--green-soft)","var(--green)"]:venc?["Vencido","oklch(0.94 0.05 25)","var(--red)"]:["Pendiente","var(--amber-soft)","var(--amber)"];
      return `<div class="remrow ${r.hecho?"done":""}">
        <input type="checkbox" ${r.hecho?"checked":""} onchange="toggleRem('${e.id}','${r.id}')">
        <div class="ic" style="background:${venc?"oklch(0.94 0.05 25)":"var(--amber-soft)"}">${venc?"⏰":"🔔"}</div>
        <div class="grow"><div class="ti">${esc(r.texto)}</div>
          <div class="cu">${r.fecha?fshort(r.fecha):"Sin fecha"}${r.monto?" · "+money(r.monto):""}</div></div>
        <span class="badge" style="background:${tag[1]};color:${tag[2]}">${tag[0]}</span>
        <button class="btn gh" onclick="delRem('${e.id}','${r.id}')">✕</button>
      </div>`;
    }).join(""):`<div class="empty">Sin recordatorios.<br>Ej: «Pagar impuestos de aduana», «Renovar seguro del BL».</div>`}</div>
  </div>`;
}

  return `<div class="g2 even">

      <div class="kv"><span>Estado</span><span>${esc(e.estado)}</span></div>
      <div class="kv"><span>Documento</span><span>${esFact?"Factura "+esc(e.factura.numero):"Cotización "+esc(e.cotizacion.numero)}</span></div>
      <div class="kv"><span>Cliente</span><span>${esc(c?c.nombre:"—")}</span></div>
      <div class="kv"><span>Abonado</span><span>${money(totalPag(e))}</span></div>
      <div class="kv"><span>Balance</span><span style="color:${balance(e)>0?"var(--red)":"var(--green)"}">${money(Math.max(0,balance(e)))}</span></div>
      <div class="kv"><span>Creado</span><span>${fshort(e.creado)}</span></div>
      <div class="row" style="gap:8px;flex-wrap:wrap;margin-top:16px">
        <button class="btn sec" onclick="exportarExpediente('${e.id}')">Exportar (JSON)</button>

/* ================= LÍNEAS ================= */
function rawFocus(inp){
  inp.value = inp.value.replace(/,/g,"");
  setTimeout(()=>inp.select(),0);
}
function fmtBlur(inp){
  inp.value = inp.value.trim()==="" ? "" : fmtNum(parseNum(inp.value));
}
/* Tab baja por la MISMA columna (Costo → Comisión → Grúa…), no de lado.
   Al terminar "Cotizado" salta al principio de "Real / Pagado". */
function navCot(ev, inp){
  if(ev.key!=="Tab" && ev.key!=="Enter") return;
  const col = inp.dataset.col;
  if(!col) return;
  ev.preventDefault();
  const atras = ev.key==="Tab" && ev.shiftKey;
  const cols  = ["monto","real"];
  const lista = c => Array.from(document.querySelectorAll(`#cotBody input[data-col="${c}"]`));
  const act   = lista(col);
  let next    = act[act.indexOf(inp) + (atras?-1:1)];
  if(!next){
    const sig = cols[cols.indexOf(col) + (atras?-1:1)];
    if(sig){ const l = lista(sig); next = atras ? l[l.length-1] : l[0]; }
  }
  if(next){ inp.blur(); next.focus(); }
}
/* Arrastrar un monto lo COPIA (no lo mueve): sirve para pasar
   el cotizado a la columna de real sin volver a escribirlo. */
function dropCopia(inp){
  setTimeout(()=>{
    inp.dispatchEvent(new Event("input",{bubbles:true}));
    fmtBlur(inp);
  },0);
}
function addLinea(id){
  const e=expediente(id);
  const primera = !e.cotizacion.lineas.length;
  e.cotizacion.lineas.push({concepto:"",monto:0,real:null});
  const i = e.cotizacion.lineas.length-1;
  const body = $("cotBody");
  if(body && !primera){
    body.insertAdjacentHTML("beforeend", lineaHTML(e, e.cotizacion.lineas[i], i));
    const inp = body.querySelector(`tr[data-i="${i}"] input`);
    if(inp) inp.focus();
    save();
  } else renderAll();   // si la tabla estaba vacía, re-render para quitar el placeholder
}
function editLinea(id,i,k,v){
  const e=expediente(id), l=e.cotizacion.lineas[i]; if(!l) return;
  if(k==="concepto") l.concepto = v;
  else if(k==="real")  l.real = (String(v).trim()===""?null:parseNum(v));
  else                 l.monto = parseNum(v);
  syncCot(e, i);
  save();
}
function syncCot(e, i){
  const l = e.cotizacion.lineas[i];
  if(l && $("d-"+i)){
    const real = (l.real===null||l.real==="")?null:Number(l.real);
    const d = real===null?null:real-(Number(l.monto)||0);
    $("d-"+i).innerHTML = varCell(d)+`<button onclick="delLinea('${e.id}',${i})" title="Eliminar" style="margin-left:6px;color:var(--faint);opacity:.5">✕</button>`;
  }
  const tc=totalCot(e), tr=totalReal(e);
  const esFact = e.factura && e.factura.activa;
  if($("tCot"))   $("tCot").textContent   = money(tc);
  if($("tReal"))  $("tReal").textContent  = money(tr);
  if($("tVar"))   $("tVar").innerHTML     = varCell(tr-tc);
  if($("tGrand")) $("tGrand").textContent = money(esFact?tr:tc);
  renderKPIs(); renderClientes(); renderExpedientes();
}

const MES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function fechaAprob(e){
  return e.aprobadoEn || (e.factura&&e.factura.activa?e.factura.fecha:"") || e.creado || "";
}
function setRango(k){
  const d = new Date(), y = d.getFullYear(), m = d.getMonth();
  const iso = dt => new Date(dt.getTime()-dt.getTimezoneOffset()*6e4).toISOString().slice(0,10);
  state.rango = k;
  if(k==="mes"){       state.desde=iso(new Date(y,m,1));      state.hasta=iso(new Date(y,m+1,0)); }
  else if(k==="ant"){  state.desde=iso(new Date(y,m-1,1));    state.hasta=iso(new Date(y,m,0)); }
  else if(k==="t3"){   state.desde=iso(new Date(y,m-2,1));    state.hasta=iso(new Date(y,m+1,0)); }
  else if(k==="anio"){ state.desde=iso(new Date(y,0,1));      state.hasta=iso(new Date(y,11,31)); }
  else {               state.desde="";                        state.hasta=""; }
  cal.mes = null; cal.esperando = 0;
  renderFinanzas();
}
function setFecha(cual,v){ state[cual]=v; state.rango="custom"; renderFinanzas(); }

/* ---------- Calendario de rango unificado ----------
   1er clic fija el DESDE · 2do clic fija el HASTA · doble clic = ese día solo */
let cal = {abierto:false, mes:null, esperando:0};
const DIAS = ["D","L","M","M","J","V","S"];
const MESL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function isoDe(dt){ return new Date(dt.getTime()-dt.getTimezoneOffset()*6e4).toISOString().slice(0,10); }

function calendarioHTML(){
  const txt = (!state.desde && !state.hasta) ? "Todo el historial"
            : (state.desde===state.hasta) ? fdate(state.desde)
            : `${state.desde?fdate(state.desde):"inicio"} → ${state.hasta?fdate(state.hasta):"…"}`;
  if(!cal.mes){
    const base = state.desde ? new Date(state.desde+"T12:00:00") : new Date();
    cal.mes = new Date(base.getFullYear(), base.getMonth(), 1);
  }
  const y = cal.mes.getFullYear(), m = cal.mes.getMonth();
  const primero = new Date(y,m,1).getDay(), dias = new Date(y,m+1,0).getDate();
  const hoy = isoDe(new Date());

  let celdas = DIAS.map(x=>`<div class="cald calh">${x}</div>`).join("");
  for(let i=0;i<primero;i++) celdas += `<div class="cald blank"></div>`;
  for(let d=1;d<=dias;d++){
    const f = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const esA = f===state.desde, esB = f===state.hasta;
    const dentro = state.desde && state.hasta && f>state.desde && f<state.hasta;
    let cls = "cald";
    if(esA||esB){
      cls += " end";
      cls += (state.desde===state.hasta) ? " solo" : (esA?" a":" b");
    }
    else if(dentro) cls += " inr";
    if(f===hoy) cls += " hoy";
    celdas += `<div class="${cls}" onclick="calClick('${f}')" ondblclick="calDia('${f}')">${d}</div>`;
  }

  return `<div class="calwrap">
    <button class="calbtn" onclick="calToggle(event)">
      <span class="ic">🗓</span><span>${txt}</span>
      ${cal.esperando===1?`<span class="hint">elige el fin…</span>`:""}
    </button>
    <div class="calpop ${cal.abierto?"on":""}" onclick="event.stopPropagation()">
      <div class="calnav">
        <button onclick="calMes(-1)">‹</button>
        <b>${MESL[m]} ${y}</b>
        <button onclick="calMes(1)">›</button>
      </div>
      <div class="calgrid">${celdas}</div>
      <div class="calft">
        <span class="tiny">Un clic fija el inicio, el siguiente el fin.<br>Doble clic para ver un solo día.</span>
        <button class="btn sec sm" onclick="setRango('todo');calCerrar()">Todo</button>
      </div>
    </div>
  </div>`;
}
function calToggle(ev){
  if(ev) ev.stopPropagation();
  cal.abierto = !cal.abierto;
  if(!cal.abierto) cal.esperando = 0;
  renderFinanzas();
}
function calCerrar(){ cal.abierto=false; cal.esperando=0; renderFinanzas(); }
function calMes(n){ cal.mes = new Date(cal.mes.getFullYear(), cal.mes.getMonth()+n, 1); renderFinanzas(); }
function calClick(f){
  if(cal.esperando===0){ state.desde=f; state.hasta=f; cal.esperando=1; }
  else {
    if(f < state.desde){ state.hasta = state.desde; state.desde = f; }
    else state.hasta = f;
    cal.esperando = 0;
  }
  state.rango = "custom";
  renderFinanzas();
}
function calDia(f){ state.desde=f; state.hasta=f; state.rango="custom"; cal.esperando=0; renderFinanzas(); }
document.addEventListener("click", ()=>{ if(cal.abierto) calCerrar(); });
function enRango(f){
  if(!f) return false;
  if(state.desde && f < state.desde) return false;
  if(state.hasta && f > state.hasta) return false;
  return true;
}

function renderFinanzas(){
  if(!state.desde && !state.hasta && state.rango==="mes") { setRango("mes"); return; }

  const aprob = DB.expedientes.filter(esAprobado);
  const activos = DB.expedientes.filter(e=>e.estado!=="Entregado").length;

  // movimientos (abonos) del período
  const movsRango = [];
  aprob.forEach(e=>{ const c=cliente(e.clienteId);
    (e.pagos||[]).forEach(p=>{ if(enRango(p.fecha)) movsRango.push({p,e,c}); }); });
  movsRango.sort((a,b)=>(b.p.fecha||"").localeCompare(a.p.fecha||""));

  const cobrado   = movsRango.reduce((s,x)=>s+(Number(x.p.monto)||0),0);
  const porCobrar = aprob.reduce((s,e)=>s+Math.max(0,balance(e)),0);
  const clientesDeuda = new Set(aprob.filter(e=>balance(e)>0).map(e=>e.clienteId)).size;
  const totalAprob = aprob.reduce((s,e)=>s+totalReal(e),0);
  const nuevos = aprob.filter(e=>enRango(fechaAprob(e)));
  const varia  = nuevos.reduce((s,e)=>s+(totalReal(e)-totalCot(e)),0);

  // balance por cliente
  const porCli = DB.clientes.map(c=>{
    const ex = expsDe(c.id).filter(esAprobado);
    const cot = ex.reduce((s,e)=>s+totalCot(e),0);
    const rea = ex.reduce((s,e)=>s+totalReal(e),0);
    const co  = ex.reduce((s,e)=>s+totalPag(e),0);
    return {c, n:ex.length, cot, rea, co, pend:Math.max(0,rea-co), va:rea-cot};
  }).filter(x=>x.n>0).sort((a,b)=>b.pend-a.pend);

  // ---- chart: cobros por período ----
  const iso = dt => new Date(dt.getTime()-dt.getTimezoneOffset()*6e4).toISOString().slice(0,10);
  let start = state.desde, end = state.hasta || today();
  if(!start){
    let min=null;
    DB.expedientes.forEach(e=>(e.pagos||[]).forEach(p=>{ if(p.fecha&&(!min||p.fecha<min))min=p.fecha; }));
    start = min || iso(new Date(Date.now()-30*864e5));
  }
  const d0=new Date(start+"T12:00:00"), d1=new Date(end+"T12:00:00");
  const totalDias = Math.max(1, Math.round((d1-d0)/864e5)+1);
  const step = totalDias<=31?1:Math.ceil(totalDias/22);
  const buckets=[];
  for(let off=0; off<totalDias; off+=step){
    const bs=new Date(d0.getTime()+off*864e5);
    const be=new Date(d0.getTime()+Math.min(off+step-1,totalDias-1)*864e5);
    const bsI=iso(bs), beI=iso(be);
    let cob=0, pc=0;
    DB.expedientes.forEach(e=>{
      (e.pagos||[]).forEach(p=>{ if(p.fecha>=bsI&&p.fecha<=beI) cob+=Number(p.monto)||0; });
      const fa=fechaAprob(e);
      if(esAprobado(e)&&fa>=bsI&&fa<=beI) pc+=Math.max(0,totalReal(e)-totalPag(e));
    });
    buckets.push({lbl: step===1?String(+bsI.slice(-2)):(+bsI.slice(-2)+" "+MES3[+bsI.slice(5,7)-1]), cob, pc});
  }
  const maxB = Math.max(1, ...buckets.map(b=>b.cob+b.pc));

  // ---- movimientos recientes (globales) ----
  const movRec=[];
  DB.expedientes.forEach(e=>{ const c=cliente(e.clienteId);
    (e.pagos||[]).forEach(p=>movRec.push({p,e,c})); });
  movRec.sort((a,b)=>(b.p.fecha||"").localeCompare(a.p.fecha||""));
  const movTop = movRec.slice(0,6);

  const chips=[["mes","Este mes"],["ant","Mes pasado"],["t3","Últimos 3 meses"],["anio","Este año"],["todo","Todo"]];
  const kpi=(label,icon,iconBg,val,valColor,sub,subColor)=>`
    <div class="fk"><div class="top"><div class="lbl">${label}</div><div class="ic" style="background:${iconBg}">${icon}</div></div>
      <div class="val" style="color:${valColor}">${val}</div><div class="sub" style="color:${subColor}">${sub}</div></div>`;

  $("viewFin").innerHTML = `
    <div class="finhd">
      <div><h1>Resumen financiero</h1>
        <p>Período: ${fshort(start)} – ${fshort(end)} · ${activos} expediente${activos!==1?"s":""} activo${activos!==1?"s":""}</p></div>
      <div class="tools">
        <div class="chips-cal" style="margin:0">${chips.map(([k,t])=>`<span class="chip-cal ${state.rango===k?"on":""}" onclick="setRango('${k}')">${t}</span>`).join("")}</div>
        ${calendarioHTML()}
        <button class="btn-exp" onclick="exportarMovimientos()">${ICON.download}Exportar</button>
      </div>
    </div>

    <div class="fkpis">
      ${kpi("Cobrado","📗","var(--green-soft)",money(cobrado),"var(--text)",`${movsRango.length} abono${movsRango.length!==1?"s":""} en el período`,"var(--green)")}
      ${kpi("Por cobrar","🧾","var(--accent-soft)",money(porCobrar),"var(--text)",`${clientesDeuda} cliente${clientesDeuda!==1?"s":""} · al día de hoy`,"var(--muted)")}
      ${kpi("Aprobado","✅","var(--green-soft)",money(totalAprob),"var(--text)",`${aprob.length} expediente${aprob.length!==1?"s":""}`,"var(--muted)")}
      ${kpi("Variación","📈",(varia>0?"oklch(0.94 0.05 25)":"var(--green-soft)"),(varia>0?"+ ":varia<0?"− ":"")+money(Math.abs(varia)),(varia>0?"var(--red)":varia<0?"var(--green)":"var(--text)"),"Sobre lo cotizado","var(--muted)")}
    </div>

    <div class="fgrid">
      <div class="chartcard">
        <div class="chart-head"><div class="t">Cobros por día</div>
          <div class="legend"><span><i style="background:var(--accent)"></i>Cobrado</span><span><i style="background:oklch(0.9 0.02 255)"></i>Por cobrar</span></div></div>
        <div class="bars">${buckets.map(b=>`
          <div class="bar-col" title="Cobrado ${money(b.cob)} · Por cobrar ${money(b.pc)}">
            <div class="bar-stack">
              <div class="h2" style="height:${b.pc/maxB*160}px"></div>
              <div class="h1" style="height:${b.cob/maxB*160}px"></div>
            </div>
            <span class="d">${b.lbl}</span>
          </div>`).join("")}</div>
      </div>

      <div class="movcard">
        <div class="movhd">Movimientos recientes</div>
        <div class="movlist">${movTop.length?movTop.map(x=>`
          <div class="movrow" style="cursor:pointer" onclick="verExpediente('${x.e.clienteId}','${x.e.id}')">
            <div class="ic" style="background:var(--green-soft)"><svg viewBox="0 0 24 24" stroke="var(--green)"><path d="${ICON.up}"/></svg></div>
            <div class="grow"><div class="nm trunc">${esc(x.c?x.c.nombre:"—")} — abono</div><div class="f">${fshort(x.p.fecha)} · ${esc(x.p.metodo||"Abono")}</div></div>
            <div class="amt" style="color:var(--green)">+${money(x.p.monto)}</div>
          </div>`).join(""):`<div class="empty">Sin movimientos todavía.</div>`}</div>
      </div>
    </div>

    <div class="baltable">
      <div class="movhd">Balance por cliente</div>
      <div class="thd"><span>Cliente</span><span>Cotizado</span><span>Cobrado</span><span>Por cobrar</span><span>Variación</span></div>
      ${porCli.length?porCli.map(x=>`
        <div class="balrow" onclick="verCliente('${x.c.id}')">
          <div class="who"><div class="av" style="background:${avColor(x.c.nombre)}">${esc(inicial(x.c.nombre))}</div><span class="nm">${esc(x.c.nombre)}</span></div>
          <span class="c cot">${money(x.cot)}</span>
          <span class="c cob">${money(x.co)}</span>
          <span class="c pc" style="color:${x.pend>0?"var(--red)":"var(--green)"}">${money(x.pend)}</span>
          <span class="c va" style="color:${x.va>0?"var(--red)":x.va<0?"var(--green)":"var(--faint)"}">${x.va===0?"—":(x.va>0?"▲ ":"▼ ")+money(Math.abs(x.va))}</span>
        </div>`).join(""):`<div class="empty">Aún no hay expedientes aprobados. Entran aquí al aprobarse o facturarse.</div>`}
    </div>`;
}

function verCliente(cid){ state.cli=cid; state.exp=null; setView("ops"); renderAll(); }
function verExpediente(cid,eid){ state.cli=cid; state.exp=eid; state.tab="pag"; setView("ops"); renderAll(); }

function exportarMovimientos(){
  const rows = [["Fecha","Cliente","Expediente","Concepto","Metodo","Monto"]];
  DB.expedientes.filter(esAprobado).forEach(e=>{
    const c = cliente(e.clienteId);
    (e.pagos||[]).forEach(p=>{ if(enRango(p.fecha))
      rows.push([p.fecha, c?c.nombre:"", e.titulo, p.concepto||"Abono", p.metodo||"", Number(p.monto)||0]); });
  });
  if(rows.length===1){ toast("No hay movimientos en el período"); return; }
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  download(`MIA-RD_movimientos_${state.desde||"inicio"}_${state.hasta||"hoy"}.csv`, "﻿"+csv, "text/csv");
  toast("Movimientos exportados");
}

  const s = DB.settings;
  s.empresa=$("sEmp").value.trim()||"MIA-RD"; s.moneda=$("sMon").value.trim()||"US$";
  s.tel=$("sTel").value.trim(); s.email=$("sMail").value.trim(); s.rnc=$("sRnc").value.trim();

function subirLogo(inp){
  const f = inp.files[0]; if(!f) return;
  if(f.size > 900000){ toast("Imagen muy grande (máx ~900 KB)"); return; }
  const r = new FileReader();
  r.onload = ev => { DB.settings.logo = ev.target.result; save(); openAjustes(); paintLogos(); toast("Logo actualizado"); };
  r.readAsDataURL(f);
}
function quitarLogo(){ DB.settings.logo=null; save(); openAjustes(); paintLogos(); }

function download(name, text, type){
  const b = new Blob([text], {type:type||"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(b); a.download = name; a.click();
  setTimeout(()=>{try{URL.revokeObjectURL(a.href)}catch(_){}},1500);
}

function exportarExpediente(id){
  const e = expediente(id), c = cliente(e.clienteId);

    exportado: new Date().toISOString(),
    cliente: c,
    expediente: e,
    resumen: {
      total_cotizado: totalCot(e), total_real: totalReal(e),
      total_abonado: totalPag(e), balance: balance(e),
      variacion: totalReal(e)-totalCot(e)
    }
  };
  const slug = e.titulo.replace(/[^\w\s-]/g,"").replace(/\s+/g,"_");
  download(`Expediente_${slug}.json`, JSON.stringify(data,null,2));

function importar(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try{
      const d = JSON.parse(ev.target.result);
      if(!d.clientes || !d.expedientes) throw 0;
      if(!confirm("Esto reemplazará todos los datos actuales. ¿Continuar?")) return;
      DB = d; state={cli:null,exp:null,tab:"cot"};
      closeModal(true); boot(); toast("Datos importados");
    }catch(err){ toast("Archivo no válido"); }
  };
  r.readAsText(f);
}

<div class="noprint">
  <button class="g" onclick="window.close()">Cerrar</button>
  <button onclick="window.print()">Guardar como PDF</button>
</div>
<div class="doc">
  <div class="top">
    <div>${logo}<div class="tag">${esc(s.tagline)}</div></div>
    <div class="meta">
      <div class="badge ${esFact?"f":""}">${esFact?"Factura":"Cotización"}</div>
      <div><span class="lbl">No.</span><b>${esc(num)}</b></div>

      ${esFact?"":`<div style="margin-top:6px"><span class="lbl">Válida hasta</span>${fdate(vence)}</div>`}
    </div>
  </div>

  <div class="cols">
    <div class="box">
      <div class="lbl">Cliente</div>
      <div class="big">${esc(c?c.nombre:"—")}</div>
      <div class="sm">${[c&&c.telefono, c&&c.email].filter(Boolean).map(esc).join(" · ")||"&nbsp;"}</div>
    </div>
    <div class="box">
      <div class="lbl">Unidad</div>
      <div class="big">${esc(e.titulo)}</div>
      <div class="sm">${e.vin?"VIN: "+esc(e.vin):"&nbsp;"}</div>
    </div>
  </div>

  <table>
    <thead><tr><th>Concepto</th><th class="n" style="width:150px">Monto</th></tr></thead>
    <tbody>${filas||'<tr><td colspan="2" style="color:#9a9aa2;padding:18px 0">Sin conceptos registrados</td></tr>'}</tbody>
  </table>

  <div class="tot"><div class="totbox">
    <div class="totrow grand"><span>TOTAL</span><span>${money(tot)}</span></div>
    ${tp>0?`<div class="totrow" style="margin-top:8px"><span>Abonado</span><span>− ${money(tp)}</span></div>
      <div class="totrow bal"><span>Balance pendiente</span><span>${money(Math.max(0,bal))}</span></div>`:""}
  </div></div>

  ${e.cotizacion.notas?`<div class="notas"><b>Notas:</b> ${esc(e.cotizacion.notas)}</div>`:""}
  ${e.detalles?`<div class="notas" style="border-left-color:#9a9aa2"><b>Especificaciones:</b> ${esc(e.detalles)}</div>`:""}

  <div class="terms"><b>Términos y condiciones</b>${esc(s.terminos)}</div>

  <div class="firma"><div>Firma autorizada — ${esc(s.empresa)}</div><div>Aceptación del cliente</div></div>

  <div class="foot">${esc(s.empresa)}${s.rnc?" · RNC "+esc(s.rnc):""}${s.tel?" · "+esc(s.tel):""}${s.email?" · "+esc(s.email):""}</div>
</div>
</body></html>`;

  const w = window.open("", "_blank", "width=940,height=1000");
  if(!w){ toast("Permite las ventanas emergentes para imprimir"); return; }
  w.document.write(html); w.document.close();

/* ================= BOOT ================= */
function paintLogos(){
  const bf = $("brandFoot"); if(bf) bf.textContent = "© 2026 MIA-RD · Santo Domingo, R.D. · "+VERSION;
  const vt = $("verTag"); if(vt) vt.textContent = "MIA-RD "+VERSION;
  const l = $("loginLogo");
  if(l) l.innerHTML = `<div style="height:34px;display:flex">${logoHTML(34)}</div>`;
  const b = $("brandLogo");
  if(b && !DB.settings.logo) b.innerHTML = `<img src="${LOGO_DEF}" style="height:40px;width:auto;filter:brightness(0) invert(1)">`;
  else if(b) b.innerHTML = `<img src="${DB.settings.logo}" style="height:40px;width:auto;filter:brightness(0) invert(1)">`;
  $("hdLogo").innerHTML = logoHTML(25);
}
function boot(){
  paintLogos();
  const un = credenciales().user || "";
  $("usrNom").textContent = un;
  $("usrNom").title = un;
  $("usrAv").textContent = (un.trim()[0]||"·").toUpperCase();
  setRango(state.rango==="custom"?"mes":state.rango);
  setView(state.view);
  renderAll();
}

load();
if(configurado() && sesionActiva()) entrar();   // refrescar la página ya no te saca
else renderLogin();
</script>
